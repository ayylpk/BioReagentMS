server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:BioReagentMS}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    type: com.alibaba.druid.pool.DruidDataSource
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.bioreagent.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      bioreagent:
        mapper: debug
        service: info
        controller: info
    org.springframework.data.redis: DEBUG
    io.lettuce.core: DEBUG

bioreagent:
  jwt:
    secret-key: ${JWT_SECRET_KEY:}
    ttl: 7200000
    token-name: token

